name: release
on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:

permissions:
  contents: write # goreleaser publishes a GitHub Release and uploads its assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    name: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pinned explicitly rather than go-version-file: go.mod. go.mod's go
          # directive is deliberately kept at 1.26.0 for a downstream consumer's
          # build compatibility (see SEC-02); this only controls the toolchain
          # used to compile kdt's own released binaries.
          go-version: 1.26.5
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
